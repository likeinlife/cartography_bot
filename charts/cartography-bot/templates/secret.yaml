{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cartography-bot.secretName" . }}
  labels:
    {{- include "cartography-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  BOT_TOKEN: {{ required "secret.botToken is required when secret.create=true and secret.existingSecret is empty" .Values.secret.botToken | quote }}
  ADMIN_ID: {{ required "secret.adminId is required when secret.create=true and secret.existingSecret is empty" .Values.secret.adminId | quote }}
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
{{- end }}
